name: Daily Academic Summary Bot

on:
  schedule:
    # 毎日 UTC 22:00（＝日本時間 翌朝07:00）に自動実行
    - cron: '0 22 * * *'
  # テスト用に、GitHubの画面から手動でいつでも実行できるボタンも設置
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
    # 1. リポジトリのコードを仮想環境にチェックアウト
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. 仮想環境にPythonをセットアップ
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. 必要なライブラリのインストール
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 4. Pythonスクリプトの実行
    - name: Run Python script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python main.py

    # 5. 生成されたHTMLファイルをリポジトリに自動保存
    - name: Commit and Push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add .
        git diff --cached --quiet || git commit -m "Update daily summary $(date +'%Y-%m-%d')"
        git push
